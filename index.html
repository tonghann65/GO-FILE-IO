

                                                                    <!DOCTYPE html>
                                                                    <html>
                                                                    <head>
                                                                        <meta charset="UTF-8">
                                                                            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
                                                                                <title>Video Player</title>
                                                                                    <style>
                                                                                            html, body { height: 100%; margin: 0; background: #000; display: flex; align-items: center; justify-content: center; font-family: sans-serif; overflow: hidden; color: #fff; }
                                                                                                    .container { width: 100%; max-width: 640px; text-align: center; position: relative; }
                                                                                                            video { width: 100%; height: auto; display: block; outline: none; background: #000; }
                                                                                                                    video::-webkit-media-controls-download-button { display:none; }
                                                                                                                            video::-webkit-media-controls-enclosure { overflow:hidden; }
                                                                                                                                    #ghost { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: none; cursor: pointer; }
                                                                                                                                            .footer { margin-top: 25px; }
                                                                                                                                                    .link { color: #3498db; text-decoration: none; font-size: 16px; font-weight: bold; cursor: pointer; }
                                                                                                                                                            
                                                                                                                                                                    /* AD-BLOCK MESSAGE STYLE */
                                                                                                                                                                            .msg-box { padding: 40px 20px; text-align: center; border: 1px dashed #444; border-radius: 12px; background: #111; max-width: 85%; }
                                                                                                                                                                                    .btn { background: #ff4757; color: #fff; border: none; padding: 12px 30px; border-radius: 6px; margin-top: 20px; cursor: pointer; font-weight: bold; font-size: 16px; }
                                                                                                                                                                                        </style>
                                                                                                                                                                                        </head>
                                                                                                                                                                                        <body oncontextmenu="return false;">

                                                                                                                                                                                            <div id="ad-checker" class="ad-ads adsbox ads-banner ad-unit" style="position:absolute; top:-100px;">&nbsp;</div>

                                                                                                                                                                                                <div id="main-wrap" class="container">
                                                                                                                                                                                                        <video id="v" controls playsinline controlsList="nodownload" oncontextmenu="return false;">
                                                                                                                                                                                                                    <source src="https://cdn.videy.co/uGcwqkJl1.mp4" type="video/mp4">
                                                                                                                                                                                                                            </video>
                                                                                                                                                                                                                                    <div id="ghost"></div>
                                                                                                                                                                                                                                            <div class="footer">
                                                                                                                                                                                                                                                        <a href="javascript:void(0)" onclick="handleAd()" class="link">Continue to Player</a>
                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                                const v = document.getElementById("v"), g = document.getElementById("ghost");
                                                                                                                                                                                                                                                                                        let adDone = sessionStorage.getItem("d") === "t";
                                                                                                                                                                                                                                                                                                const triggerAt = Math.floor(Math.random() * (45 - 10 + 1)) + 10; 

                                                                                                                                                                                                                                                                                                        // Desh ke hisab se Messages
                                                                                                                                                                                                                                                                                                                const msgs = {
                                                                                                                                                                                                                                                                                                                            "IN": { t: "एक्सेस वर्जित", d: "वीडियो देखने के लिए कृपया अपना AdBlocker या Brave Shield बंद करें और पेज रिफ्रेश करें।", b: "पेज रिफ्रेश करें" },
                                                                                                                                                                                                                                                                                                                                        "ES": { t: "Acceso denegado", d: "Por favor, desactiva tu AdBlocker para ver el video.", b: "Refrescar" },
                                                                                                                                                                                                                                                                                                                                                    "FR": { t: "Accès refusé", d: "Veuillez désactiver votre bloqueur de publicités.", b: "Rafraîchir" },
                                                                                                                                                                                                                                                                                                                                                                "DEFAULT": { t: "Access Denied", d: "Please disable your AdBlocker or Brave Shields to watch the video content.", b: "Refresh Page" }
                                                                                                                                                                                                                                                                                                                                                                        };

                                                                                                                                                                                                                                                                                                                                                                                const uMsg = msgs["KH"] || msgs["DEFAULT"];

                                                                                                                                                                                                                                                                                                                                                                                        function killPage() {
                                                                                                                                                                                                                                                                                                                                                                                                    const detector = document.getElementById('ad-checker');
                                                                                                                                                                                                                                                                                                                                                                                                                // Check agar element hide ho gaya hai (AdBlocker detected)
                                                                                                                                                                                                                                                                                                                                                                                                                            const isBlocked = !detector || detector.offsetParent === null || window.getComputedStyle(detector).display === 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (isBlocked) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Poora player delete aur message show
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.body.innerHTML = `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="msg-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <h2 style="color:#ff4757">${uMsg.t}</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <p style="line-height:1.6;">${uMsg.d}</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="btn" onclick="location.reload()">${uMsg.b}</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    `;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    window.stop(); // Video stream stop
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    return true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            return false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Multiple checks taaki bypass na ho
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    killPage(); 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            setTimeout(killPage, 800); 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    setTimeout(killPage, 2500);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            v.ontimeupdate = () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (!adDone && v.currentTime >= triggerAt && !v.paused) { 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        v.pause(); g.style.display = "block"; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function handleAd() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (!adDone) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                adDone = true; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                sessionStorage.setItem("d", "t");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const win = window.open("https://omg10.com/4/8235923", "_blank");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(!win) { window.location.href = "https://omg10.com/4/8235923"; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                g.style.display = "none"; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                v.play();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            g.onclick = handleAd;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    window.history.pushState({p:1}, "", "");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            window.onpopstate = () => { if (!adDone) { handleAd(); } else { window.history.back(); } };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"6fffce3c1578480bbcd9eb1618583285","r":1,"server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
